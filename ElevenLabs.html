
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnaround Copilot - TTS Demo</title>
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar and Main Content Code Here -->
        <div class="main-content">
            <h1 class="dashboard-title">Turnaround Copilot</h1>
            <div class="copilot-container">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message">System: Welcome to Turnaround Copilot. How can I assist you today?</div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="userInput" placeholder="Ask about turnaround procedures, data, or documents...">
                        <button onclick="sendMessage()">Send</button>
                        <button onclick="speakText(userInput.body)">Speak</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const userInput = document.getElementById('userInput').value;
            const chatMessages = document.getElementById('chatMessages');

            const userMessage = document.createElement('div');
            userMessage.className = 'message';
            userMessage.textContent = `You: ${userInput}`;
            chatMessages.appendChild(userMessage);

            const copilotResponse = document.createElement('div');
            copilotResponse.className = 'message';
            copilotResponse.textContent = "Copilot: Here's the information you're looking for...";
            chatMessages.appendChild(copilotResponse);

            document.getElementById('userInput').value = '';
        }

        const textsToSpeak = {
            "spendTrend": "Here is the spend trend over the last 6 months...",
            "sop": "The standard operating procedure includes the following steps...",
            "greeting": "Welcome to Turnaround Copilot. How can I assist you today?"
        };
        
        function getTextToSpeak(keyword) {
            switch (keyword.toLowerCase()) {
                case "spend trend":
                    return textsToSpeak.spendTrend;
                case "sop":
                    return textsToSpeak.sop;
                default:
                    return textsToSpeak.greeting;
            }
        }

        async function speakText(keyword) {
            alert(keyword)
            const textToSpeak = getTextToSpeak(keyword);
            const apiKey = "sk_cef8183a5b1d9d16e6d80327c0cf9e707d8ab8a59b756c75";

            try {
                const response = await fetch('https://api.elevenlabs.io/v1/text-to-speech', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'xi-api-key': apiKey
                    },
                    body: JSON.stringify({
                        text: textToSpeak,
                        voice: "Bella", // Example voice
                        output_format: "mp3"
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch TTS data from ElevenLabs');
                }

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);

                const audio = new Audio(audioUrl);
                audio.play();
            } catch (error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
