<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnaround Copilot - PrecisionTurn</title>
    <link rel="stylesheet" href="sidebar.css">
    <script src="sidebar.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        
        .main-content {
            padding: 20px;
        }
        .copilot-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px);
        }
        .chart-container {
            width: 100%;
            max-width: 700px; /* Increase the width */
            height: 300px; /* Increase the height */
            margin: 20px auto;
        }
    
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #e0e0e0;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
        }
        .chat-input button {
            margin-left: 10px;
            padding: 10px 20px;
            background-color: #2196f3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
       
    </style>
</head>
<body>
    <div id="app">
       <!-- Sidebar will be loaded here -->
       <div id="sidebar-container"></div> 
        <div class="main-content">
            <h1 id="turnaround-copilot" class="dashboard-title">Turnaround Copilot</h1>
            <div class="copilot-container">
                <div class="chat-container">
                    <div class="chat-messages" ref="chatMessages">
                        <div v-for="message in chatMessages" :key="message.id" class="message">
                            <strong>{{ message.sender }}:</strong>
                            <div>{{ message.text }}</div>
                            <canvas v-if="message.chartId" :id="message.chartId" class="chart-container"></canvas>
                        </div>
                    </div>
                    <div class="chat-input">
                        <input v-model="userInput" @keyup.enter="sendMessage" placeholder="Ask about turnaround procedures, data, or documents...">
                        <button @click="sendMessage">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                chatMessages: [
                    { id: 1, sender: "System", text: "Welcome to Turnaround Copilot. How can I assist you today?" }
                ],
                userInput: ""
            },
            methods: {
                sendMessage() {
                    if (this.userInput.trim()) {
                        const userMessage = { id: this.chatMessages.length + 1, sender: "You", text: this.userInput };
                        this.chatMessages.push(userMessage);
                        
                        if (this.userInput.toLowerCase().includes("spend trend")) {
                            const chartId = 'spendTrendChart' + this.chatMessages.length;
                            const copilotMessage = { 
                                id: this.chatMessages.length + 1, 
                                sender: "Copilot", 
                                text: "Here's the spend trend over the last 6 months:",
                                chartId: chartId
                            };
                            this.chatMessages.push(copilotMessage);
                            
                            this.$nextTick(() => {
                                const ctx = document.getElementById(chartId);
                                if (ctx) {
                                    new Chart(ctx, {
                                        type: 'line',
                                        data: {
                                            labels: ['Month 1', 'Month 2', 'Month 3', 'Month 4', 'Month 5', 'Month 6'],
                                            datasets: [{
                                                label: 'Spend in $K',
                                                data: [300, 450, 720, 980, 1250, 1500],
                                                borderColor: 'rgb(75, 192, 192)',
                                                tension: 0.1
                                            }]
                                        },
                                        options: {
                                            responsive: true,
                                            maintainAspectRatio: true,
                                            aspectRatio: 1.5,
                                        }
                                    });
                                    this.scrollToBottom();
                                }
                            });
                        } else if (this.userInput.toLowerCase().includes("standard operating procedure")) {
                            const copilotMessage = { 
                                id: this.chatMessages.length + 1, 
                                sender: "Copilot", 
                                text: "The standard operating procedure for equipment shutdown includes the following key steps: Pre-shutdown safety meeting, verification of permits, shutdown sequence, lockout/tagout procedures, and post-shutdown checks."
                            };
                            this.chatMessages.push(copilotMessage);
                            this.$nextTick(this.scrollToBottom);
                        } else if (this.userInput.toLowerCase().includes("top five items by spend")) {
                            const copilotMessage = { 
                                id: this.chatMessages.length + 1, 
                                sender: "Copilot", 
                                text: "The top five items by spend are: Equipment Rental ($1.2M), Contractor Labor ($950K), Replacement Parts ($780K), Scaffolding ($450K), and Specialized Tools ($320K)."
                            };
                            this.chatMessages.push(copilotMessage);
                            this.$nextTick(this.scrollToBottom);
                        } else {
                            const copilotMessage = { 
                                id: this.chatMessages.length + 1, 
                                sender: "Copilot", 
                                text: "I'm sorry, I don't have specific information about that. Can you try asking about top spend items, spend trends, or standard operating procedures?" 
                            };
                            this.chatMessages.push(copilotMessage);
                            this.$nextTick(this.scrollToBottom);
                        }
                        
                        this.userInput = "";
                    }
                },
                scrollToBottom() {
                    const chatContainer = this.$refs.chatMessages;
                    setTimeout(() => {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }, 100); // Adjust timeout if necessary
                }
            }
        });
    </script>
</body>
</html>
