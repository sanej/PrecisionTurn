name: Deploy to Cloud Storage

on:
  push:
    branches:
      - main  # Deploy on pushes to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure Google Cloud Credentials
        uses: google-github-actions/auth@v0
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}  # Ensure this matches the secret you've set in GitHub

      - name: Deploy to Cloud Storage
        uses: google-github-actions/upload-cloud-storage@v0
        with:
          bucket: precisionturn-frontend  # Replace with your actual bucket name
          source: ./frontend  # Adjust to the correct directory where your frontend files are located
          destination: /  # Optional: Specify a subdirectory in your bucket
