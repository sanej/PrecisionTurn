<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personnel & Assets Management</title>

    <!--   External style refenrences -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">


    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="organization-assets.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/responsive.css">

    <!--   External JS refenrences -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://balkan.app/js/OrgChart.js"></script>
    
    <!--   Internal JS refenrences -->
    <script src="../../config.js"></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
    <script src="organization-assets.js" defer></script>
</head>
<body>
    <div id="app">
        <div id="sidebar-container"></div> 
        <div class="main-content">
            <h1 id="personnel-assets-management" class="dashboard-title">Organization & Assets</h1>

            <!-- New Alert Section -->
            <div class="alert-banner">
              <span class="alert-icon">⚠️</span>
              <span class="alert-text">Critical Resource Alert: Skill gap identified in night shift maintenance team</span>
              <button class="alert-action">View Details</button>
            </div>

            <!-- Overview Cards -->
             <!-- Enhanced Metrics Grid -->
             <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-header">Total Personnel</div>
                    <div class="metric-value highlight">150</div>
                    <div class="metric-trend positive">+5% from last month</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-header">Available Assets</div>
                    <div class="metric-value highlight">75</div>
                    <div class="metric-trend warning">-2% utilization</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-header">Resource Utilization</div>
                    <div class="metric-value highlight">85%</div>
                    <div class="metric-trend positive">Above target</div>
                </div>
            </div>

            <!-- Tabs Section-->
            <div class="nav-tabs">
              <button class="tab active" data-target="governance">Governance Structure</button>
              <button class="tab" data-target="personnel">Personnel & Teams</button>
              <button class="tab" data-target="assets">Assets & Equipment</button>
            </div>
              
               <!-- Keep existing sections -->
            <div id="governance" class="management-section active">
              <div id="orgChart"></div>
            </div>
              
              <div id="personnel" class="management-section active">
                <input type="text" id="personnel-search" placeholder="Search personnel..." class="w-full p-2 mb-4 border rounded">
                <table id="personnel-table" class="w-full">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Role</th>
                      <th>Status</th>
                      <th>Department</th>
                      <th>Governance Role</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
              
              <div id="assets" class="management-section">
                <input type="text" id="assets-search" placeholder="Search assets..." class="w-full p-2 mb-4 border rounded">
                <table id="assets-table" class="w-full">
                  <thead>
                    <tr>
                      <th>Asset Name</th>
                      <th>Type</th>
                      <th>Status</th>
                      <th>Location</th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
              
              

            
        </div>
    </div>
    
</body>
</html>
