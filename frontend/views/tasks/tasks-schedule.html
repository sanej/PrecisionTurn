<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks Schedule</title>

    <!--   External style refenrences -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    

    <!--   Internal style references -->
    <link rel="stylesheet" href="tasks-schedule.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/responsive.css">

    <!--   External JS refenrences -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script> 

    <!--   Internal JS references -->
    <script src="../../config.js"></script>
    <script src="tasks-schedule.js" defer></script> 
    <script src="../../components/sidebar/sidebar.js" defer></script>
    
</head>
<body>
   
    <div id="app">
        <div id="sidebar-container"></div>
    
        <div class="main-content">
            <h1 class="dashboard-title">Tasks Schedule</h1>
    
            <!-- Progress Timeline -->
            <div class="turnaround-progress">
                <div class="timeline">
                    <div v-for="(title, stage) in stageTitles" :key="stage" 
                         :class="['stage-marker', getStageStatus(stage)]">
                        <div class="marker-content">
                            <span class="stage-name">{{title}}</span>
                            <span class="stage-stats">{{getStageProgress(stage)}}</span>
                        </div>
                    </div>
                </div>
            </div>
    
            <!-- Task Creation -->
            <div class="create-task-section">
                <h3>Create a New Task</h3>
                <div class="create-task-form">
                    <input v-model="newTask.name" type="text" placeholder="Task Name" />
                    <input v-model="newTask.date" type="date" />
                    <input v-model="newTask.time" type="time" />
                    <select v-model="newTask.priority">
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                    <select v-model="newTask.stage">
                        <option v-for="(title, key) in stageTitles" :key="key" :value="key">
                            {{title}}
                        </option>
                    </select>
                    <label>
                        <input type="checkbox" v-model="newTask.notify"> Send SMS Notification
                    </label>
                    <button @click="addTask" class="create-btn">Create Task</button>
                </div>
            </div>
    
            <!-- Task Lists -->
            <div v-for="(tasks, stage) in tasksByStage" :key="stage" class="stage-section">
                <div class="stage-header">
                    <h3>{{ stageTitles[stage] }}</h3>
                    <span class="task-count">{{tasks.length}} tasks</span>
                </div>
    
                <table class="tasks-table">
                    <thead>
                        <tr>
                            <th>Task Name</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="task in tasks" :key="task.id">
                            <td>{{task.name}}</td>
                            <td>{{formatDate(task.date)}}</td>
                            <td>{{task.time}}</td>
                            <td>
                                <span :class="['priority-badge', task.priority]">
                                    {{task.priority}}
                                </span>
                            </td>
                            <td>
                                <input type="checkbox" v-model="task.completed">
                            </td>
                            <td>
                                <button @click="notifyLead(task)" class="notify-btn">
                                    Notify
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    
</body>
</html>
