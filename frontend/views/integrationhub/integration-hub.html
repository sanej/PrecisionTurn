<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integration Hub - PrecisionTurn</title>
    
    <!-- External style references -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="integration-hub.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    
    <!-- External JS references -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <!-- Precision Turn Internal JS references -->
    <script src="../../config.js"></script>
    <script src="integration-hub.js" defer></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
</head>
<body>
    <div id="app">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <h1 class="dashboard-title">Integration Hub</h1>
            <p>Manage and monitor all system integrations with PrecisionTurn.</p>
            <div class="integration-list">
                <div v-for="integration in integrations" :key="integration.id" class="integration-card">
                    <h3>{{ integration.name }}</h3>
                    <p>Status: <span :class="statusClass(integration.status)">{{ integration.status }}</span></p>
                    <p>Last Sync: {{ integration.lastSync }}</p>
                    <div class="actions">
                        <button @click="connectIntegration(integration)" v-if="integration.status !== 'Connected'">Connect</button>
                        <button @click="disconnectIntegration(integration)" v-if="integration.status === 'Connected'">Disconnect</button>
                        <button @click="openSettings(integration)">Settings</button>
                        <button @click="viewLogs(integration)">View Logs</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
