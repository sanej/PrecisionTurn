<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - PrecisionTurn</title>
   
    <!--   External style refenrences -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">

    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="operational-intelligence.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/responsive.css">
        
    <!--   External JS refenrences -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Precision Turn Internal JS references -->
    <script src="../../config.js"></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
    <script src="operational-intelligence.js" defer></script>
    
</head>
<body>
    
    <div id="app">
        <div id="sidebar-container"></div>
    
        <div class="main-content">
            <div class="dashboard-container">
                <h1 id="analytics-dashboard" class="dashboard-title">Analytics Dashboard</h1>
    
                <div class="filters">
                    <select id="timeRangeFilter">
                        <option value="7d">Last 7 days</option>
                        <option value="30d">Last 30 days</option>
                        <option value="90d">Last 90 days</option>
                    </select>
                    <button id="applyFilters">Apply Filters</button>
                </div>
    
                <div class="chart-container">
                    <!-- 1. Vendor Performance -->
                    <div class="chart-item">
                        <h3 class="chart-title">Vendor Performance</h3>
                        <div id="vendorPerformanceChart"></div>
                    </div>
    
                    <!-- 2. Safety Incidents -->
                    <div class="chart-item">
                        <h3 class="chart-title">Safety Incidents by Type</h3>
                        <div id="safetyIncidentsChart"></div>
                    </div>
    
                    <!-- 3. Cost Breakdown -->
                    <div class="chart-item">
                        <h3 class="chart-title">Cost Breakdown</h3>
                        <div id="costBreakdownChart"></div>
                    </div>
    
                    <!-- 4. Resource Utilization -->
                    <div class="chart-item">
                        <h3 class="chart-title">Resource Utilization</h3>
                        <div id="resourceUtilizationChart"></div>
                    </div>
    
                    <!-- 5. Equipment Downtime -->
                    <div class="chart-item">
                        <h3 class="chart-title">Equipment Downtime (Hours)</h3>
                        <div id="equipmentDowntimeChart"></div>
                    </div>
    
                    <!-- 6. Task Completion -->
                    <div class="chart-item">
                        <h3 class="chart-title">Task Completion Trend</h3>
                        <div id="taskCompletionChart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
