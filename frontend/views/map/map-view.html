<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map View</title>
    
    <!--   External style refenrences -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="map-view.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/responsive.css">
    
    <!--   External JS refenrences -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js"></script>
  
    <!-- Precision Turn Internal JS references -->
    <script src="../../config.js"></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
    <script src="map-view.js" defer></script>

    
</head>
<body>
    <div id="app">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <h1 id="facilities-map" class="dashboard-title">Facilities Map</h1>
            <div class="map-controls">
                <label for="mapLayerSelect">Map Layer:</label>
                <select id="mapLayerSelect" v-model="selectedLayer" @change="updateMapLayer">
                    <option value="default">Standard View</option>
                    <option value="satellite">Satellite View</option>
                </select>
                <input type="text" v-model="searchQuery" @keyup.enter="searchMap" placeholder="Search facilities..." />
            </div>
            <div class="map-container" id="mapView"></div>
        </div>
    </div>
    

</body>
</html>
