<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agents - PrecisionTurn</title>
    
    <!-- External style references -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="ai-agents-hub.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    
    <!-- External JS references -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>

    <!-- Precision Turn Internal JS references -->
    <script src="ai-agents-hub.js" defer></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
</head>
<body>
    <div id="app">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <h1 class="dashboard-title">AI Agents Hub</h1>
            <div class="agent-categories">
                <div v-for="(agents, category) in groupedAgents" :key="category" class="agent-category">
                    <h2>{{ category }}</h2>
                    <div class="agent-list">
                        <div v-for="agent in agents" :key="agent.id" class="agent-card">
                            <h3>{{ agent.name }}</h3>
                            <p>{{ agent.description }}</p>
                            <button @click="toggleAgent(agent)" :class="{ 'active': agent.active }">
                                {{ agent.active ? 'Deactivate' : 'Activate' }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
