<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - PrecisionTurn</title>
   
    <!--   External style refenrences -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">

    <!-- Precision Turn Internal style references -->
    <link rel="stylesheet" href="analytics.css">
    <link rel="stylesheet" href="../../components/sidebar/sidebar.css">
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/responsive.css">
        
    <!--   External JS refenrences -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    
    <!-- Precision Turn Internal JS references -->
    <script src="../../config.js"></script>
    <script src="../../components/sidebar/sidebar.js" defer></script>
    <script src="analytics.js" defer></script>
    
</head>
<body class="bg-gray-100">
    <div id="app">
        
        <!-- Sidebar will be loaded here -->
        <div id="sidebar-container"></div>
        <div class="main-content">
            <!-- Analytics Dashboard Contents -->
            <div class="dashboard-container">
                <h1 class="dashboard-title">Analytics Dashboard</h1>
            
                <div class="filters">
                    <select id="timeRangeFilter">
                        <option value="7">Last 7 days</option>
                        <option value="30">Last 30 days</option>
                        <option value="90">Last 90 days</option>
                    </select>
                    <button id="applyFilters">Apply Filters</button>
                </div>
            
                <div class="chart-container">
                    <div class="chart-item">
                        <h3>Task Completion Trend</h3>
                        <div id="taskCompletionChart"></div>
                    </div>
                    <div class="chart-item">
                        <h3>Resource Utilization</h3>
                        <div id="resourceUtilizationChart"></div>
                    </div>
                    <div class="chart-item">
                        <h3>Cost Breakdown</h3>
                        <div id="costBreakdownChart"></div>
                    </div>
                    <div class="chart-item">
                        <h3>Safety Incidents by Type</h3>
                        <div id="safetyIncidentsChart"></div>
                    </div>
                    <div class="chart-item">
                        <h3>Equipment Downtime</h3>
                        <div id="equipmentDowntimeChart"></div>
                    </div>
                    <div class="chart-item">
                        <h3>Vendor Performance</h3>
                        <div id="vendorPerformanceChart"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
